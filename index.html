<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD BINGX V22.0 - PRO LAYER</title>
    <style>
        :root { --bingx: #0052ff; --bg: #0b0e11; --card: #1e2329; --green: #00f0b5; --red: #ff3b30; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 1px solid #333; border-top: 5px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 420px; margin: 10px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .price { font-size: 55px; font-weight: bold; margin: 10px 0; }
        .mode-tag { display: inline-block; padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .mode-sideway { background: rgba(255, 215, 0, 0.2); color: var(--gold); border: 1px solid var(--gold); }
        .mode-trend { background: rgba(0, 240, 181, 0.2); color: var(--green); border: 1px solid var(--green); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .info-box { background: #2b3139; padding: 10px; border-radius: 8px; border: 1px solid #383f47; }
        .status { font-size: 11px; color: #848e9c; margin-top: 15px; }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <div id="modeTag" class="mode-tag mode-sideway">ĐANG ĐỒNG BỘ...</div>
        <div id="goldPrice" class="price">0.00</div>
        <div class="info-grid">
            <div class="info-box"><span style="font-size:10px">RSI</span><br><b id="rsiVal">--</b></div>
            <div class="info-box"><span style="font-size:10px">VOL</span><br><b id="volPower">--</b></div>
        </div>
        <div id="marketState" style="font-weight:bold; color:var(--gold)">Hệ thống sẵn sàng</div>
        <div id="scanStatus" class="status">🛰️ Vệ tinh Trump & War đang hoạt động...</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0, isTrading = false;
        let lastBreakingNews = "", lastNewsId = "", h1Trend = "--", h4Trend = "--", d1Trend = "--";
        let activeTrade = null; // Lưu trữ lệnh để theo dõi SL/TP

        function initBot() {
            updateData(); 
            setInterval(updateData, 2000); 
            setInterval(checkTeleCommands, 1500); 
            setInterval(scanWorldNews, 30000); 
            setInterval(fetchForexFactory, 600000); 
            setInterval(sendDailyPlan, 60000);
        }

        async function updateData() {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                const volumes = d.map(x => parseFloat(x[5]));
                
                basePrice = prices[prices.length - 1];
                const currentPrice = basePrice + priceOffset;
                document.getElementById('goldPrice').innerText = currentPrice.toFixed(2);

                const rsi = calcRSI(prices);
                const avgVol = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
                const volRatio = volumes[volumes.length - 1] / avgVol;
                const ema20 = prices.slice(-20).reduce((a, b) => a + b, 0) / 20;

                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                document.getElementById('volPower').innerText = volRatio.toFixed(1) + "x";

                await updateMultiTrends();

                // --- LOGIC THEO DÕI LỆNH (SL/TP) ---
                if (isTrading && activeTrade) {
                    checkLiveResult(currentPrice);
                }

                // --- LOGIC VÀO LỆNH MỚI ---
                if (!isTrading) {
                    const isVolConfirm = (volRatio > 1.5);
                    const isNewsActive = (lastBreakingNews !== "" || lastNewsId !== "");
                    
                    if (isVolConfirm || isNewsActive) { // CHẾ ĐỘ TREND
                        document.getElementById('modeTag').innerText = "🔥 TREND JACKPOT";
                        if (currentPrice > ema20 + 0.5) executeLayered("BUY", "TREND/NEWS", 25, [40, 70, 100]);
                        else if (currentPrice < ema20 - 0.5) executeLayered("SELL", "TREND/NEWS", 25, [40, 70, 100]);
                    } else if (rsi < 25 || rsi > 75) { // CHẾ ĐỘ SIDEWAY
                        document.getElementById('modeTag').innerText = "💤 SIDEWAY";
                        if (rsi < 25) executeLayered("BUY", "SIDEWAY (RSI)", 15, [15, 22, 30]);
                        else if (rsi > 75) executeLayered("SELL", "SIDEWAY (RSI)", 15, [15, 22, 30]);
                    }
                }
            } catch (e) {}
        }

        function executeLayered(type, mode, sl, tps) {
            isTrading = true;
            const p = basePrice + priceOffset;
            
            // ENTRY 2 CÁCH ENTRY 1 LÀ 5 GIÁ
            const e1 = p;
            const e2 = (type === "BUY") ? p - 5.0 : p + 5.0;
            const stopLoss = (type === "BUY") ? e2 - sl : e2 + sl;
            
            activeTrade = { type, entry: e1, entry2: e2, sl: stopLoss, tp1: (type==="BUY"?p+tps[0]:p-tps[0]), status: "OPEN" };

            let msg = `⚔️ **LỆNH LAYER V22.0**\n\n🎯 Lệnh: **${type}**\n📌 Mode: ${mode}\n\n`;
            msg += `📍 **ENTRY 1: ${e1.toFixed(2)}** (Vùng 2 giá)\n`;
            msg += `📍 **ENTRY 2: ${e2.toFixed(2)}** (Cách 5 giá)\n\n`;
            msg += `🛑 SL TỔNG: ${stopLoss.toFixed(2)}\n`;
            msg += `💰 TP: ${(type==="BUY"?p+tps[0]:p-tps[0]).toFixed(2)} -> ${(type==="BUY"?p+tps[2]:p-tps[2]).toFixed(2)}\n\n`;
            msg += `📊 Xu hướng: H4 ${h4Trend} | D1 ${d1Trend}`;
            
            sendTele(msg);
        }

        function checkLiveResult(cp) {
            const t = activeTrade;
            // CHECK SL
            if ((t.type === "BUY" && cp <= t.sl) || (t.type === "SELL" && cp >= t.sl)) {
                sendTele(`💀 **LỆNH ĐÃ CHẠM SL!**\nGiá hiện tại: ${cp.toFixed(2)}\n*Gõ /done để reset.*`);
                isTrading = false; activeTrade = null;
            }
            // CHECK TP1
            if (t.status === "OPEN" && ((t.type === "BUY" && cp >= t.tp1) || (t.type === "SELL" && cp <= t.tp1))) {
                sendTele(`💰 **LỆNH ĐÃ CHẠM TP1!**\nGiá hiện tại: ${cp.toFixed(2)}\n*Hãy dời SL về Entry 1 để bảo toàn vốn!*`);
                t.status = "TP1_HIT";
            }
        }

        async function updateMultiTrends() {
            try {
                const intervals = ['1h', '4h', '1d'];
                const results = await Promise.all(intervals.map(i => fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=${i}&limit=20`).then(r => r.json())));
                h1Trend = getEmaTrend(results[0]); h4Trend = getEmaTrend(results[1]); d1Trend = getEmaTrend(results[2]);
            } catch (e) {}
        }

        function getEmaTrend(data) {
            const closes = data.map(x => parseFloat(x[4]));
            const ema = closes.reduce((a, b) => a + b, 0) / closes.length;
            return closes[closes.length - 1] > ema ? "TĂNG ↑" : "GIẢM ↓";
        }

        async function scanWorldNews() {
            try {
                const r = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN');
                const d = await r.json();
                const latest = d.Data[0];
                if (latest && latest.id !== lastBreakingNews) {
                    const txt = (latest.title + latest.body).toLowerCase();
                    if (['war','trump','tariff','nuclear','attack'].some(k => txt.includes(k))) {
                        sendTele(`🚨 **TIN NÓNG:** ${latest.title}`);
                        lastBreakingNews = latest.id;
                    }
                }
            } catch (e) {}
        }

        async function fetchForexFactory() {
            try {
                const r = await fetch('https://nfs.faireconomy.media/ff_calendar_thisweek.json');
                const events = await r.json();
                const now = new Date();
                events.forEach(e => {
                    const diff = (new Date(e.date) - now) / 60000;
                    if (e.impact === "High" && diff > 0 && diff <= 30 && lastNewsId !== e.title) {
                        sendTele(`🔔 **TIN ĐỎ TRONG 30P:** ${e.title}`);
                        lastNewsId = e.title;
                    }
                });
            } catch (e) {}
        }

        function sendDailyPlan() {
            const now = new Date();
            if (now.getHours() === 6 && now.getMinutes() === 30) {
                const p = basePrice + priceOffset;
                sendTele(`☀️ **PLAN SÁNG:**\nPivot: ${p.toFixed(2)}\nH4: ${h4Trend} | D1: ${d1Trend}`);
            }
        }

        async function checkTeleCommands() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId+1}&timeout=1`);
                const d = await r.json();
                if (d.result) for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    const m = u.message.text.trim().toLowerCase();
                    if (m === "/ping") sendTele(`✅ BOT LIVE - Giá: ${(basePrice+priceOffset).toFixed(2)}`);
                    if (m === "/done") { isTrading = false; activeTrade = null; sendTele("✅ Reset thành công!"); }
                    if (m.startsWith("/sync")) { priceOffset = parseFloat(m.replace("/sync","")) - basePrice; sendTele("🎯 Đã khớp giá BingX!"); }
                }
            } catch (e) {}
        }

        function calcRSI(p) {
            let g = 0, l = 0;
            for (let i = p.length - 14; i < p.length; i++) {
                let d = p[i] - p[i-1];
                if (d >= 0) g += d; else l -= d;
            }
            return 100 - (100 / (1 + (g / (l || 1))));
        }

        function sendTele(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }
    </script>
</body>
</html>
