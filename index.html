<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO V12.3 - FULL FIX</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 450px; margin: 10px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price { font-size: 45px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .mode-box { background: #000; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; border: 1px solid #444; }
        .indicators { display: flex; justify-content: space-around; font-size: 13px; color: #848e9c; border-top: 1px solid #333; padding-top: 10px; }
        .chat-container { background: #161a1e; border-radius: 10px; padding: 10px; margin-top: 20px; text-align: left; border: 1px solid #333; }
        #chatBox { height: 120px; overflow-y: auto; font-size: 12px; border-bottom: 1px solid #333; margin-bottom: 10px; padding-bottom: 5px; color: #ccc; }
        .chat-input { display: flex; gap: 5px; }
        input { flex: 1; background: #2b3139; border: none; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: var(--gold); border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; color: black; }
        .log-box { text-align: left; background: #000; padding: 10px; height: 60px; overflow-y: auto; font-size: 11px; color: var(--green); border: 1px solid #333; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body onload="initBot()">

    <div class="card">
        <div style="color: var(--gold); font-weight: bold; font-size: 18px;">GOLD V12.3 - TRADER AI</div>
        <div id="botStatus" style="color: var(--red); margin: 5px 0; font-size: 11px;">🔴 CHỜ KÍCH HOẠT /START</div>
        
        <div id="goldPrice" class="price">0.00</div>
        
        <div id="newsMode" class="mode-box">
            Dự báo: <b id="forecastText" style="color: var(--green);">ỔN ĐỊNH</b><br>
            <small id="newsDetail">Đang phân tích tin đòn bẩy 1:200...</small>
        </div>

        <div class="indicators">
            <div>RSI: <b id="rsiVal" style="color: white;">--</b></div>
            <div>Biến động: <b id="volatVal">--</b></div>
            <div>Kiểu: <b id="marketType">--</b></div>
        </div>

        <div class="chat-container">
            <div style="font-size: 11px; color: var(--gold); margin-bottom: 5px; font-weight: bold;">🤖 HỎI AI CAO THỦ:</div>
            <div id="chatBox">Chào bro! Code đã fix xong lệnh Sync. Cần hỏi gì không?</div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Vàng sập hay bay bro?">
                <button onclick="askAI()">Hỏi</button>
            </div>
        </div>

        <div id="logs" class="log-box">> AI đang sẵn sàng tác chiến...</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";
        const GEMINI_API_KEY = "AIzaSyCGG2W6jOSjJamkPx0-2eo4qkotbr7RDXE";

        let isRunning = false, lastUpdateId = 0, priceOffset = 0;
        let lastAction = "", lastHeartbeat = Date.now(), basePrice = 0;
        let tradeDirection = "BOTH";

        function initBot() { setInterval(checkTele, 2000); }

        async function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value) return;
            const userMsg = input.value;
            chatBox.innerHTML += `<br><b style="color:var(--gold)">Bạn:</b> ${userMsg}`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Bạn là cao thủ trade vàng chuyên nghiệp, hãy trả lời ngắn gọn và hài hước: " + userMsg }] }] })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<br><b style="color:var(--green)">AI:</b> ${aiMsg}`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<br><i style="color:red">Lỗi: Kiểm tra API Key trên web.</i>`;
            }
        }

        async function updateData() {
            if (!isRunning) return;
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=200`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                basePrice = prices[prices.length - 1];
                const isGreen = basePrice > prices[prices.length - 2];

                let g = 0, l = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    let diff = prices[i] - prices[i-1];
                    if (diff >= 0) g += diff; else l -= diff;
                }
                const rsi = 100 - (100 / (1 + (g / l)));
                const range = Math.max(...prices.slice(-20)) - Math.min(...prices.slice(-20));
                const isSideway = range < 8;

                document.getElementById('goldPrice').innerText = (basePrice + priceOffset).toFixed(2);
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                document.getElementById('volatVal').innerText = range.toFixed(1);
                document.getElementById('marketType').innerText = isSideway ? "SIDEWAY" : "CÓ SÓNG";

                if (isSideway) {
                    if (rsi <= 30 && isGreen && lastAction !== "S_BUY") { sendAction("SIDE BUY", (basePrice + priceOffset), 15, 10); lastAction = "S_BUY"; }
                    else if (rsi >= 70 && !isGreen && lastAction !== "S_SELL") { sendAction("SIDE SELL", (basePrice + priceOffset), -15, 10); lastAction = "S_SELL"; }
                } else {
                    if (tradeDirection !== "SELL_ONLY" && rsi <= 35 && isGreen && lastAction !== "T_BUY") { sendAction("TREND BUY", (basePrice + priceOffset), 30, 15); lastAction = "T_BUY"; }
                    else if (tradeDirection !== "BUY_ONLY" && rsi >= 65 && !isGreen && lastAction !== "T_SELL") { sendAction("TREND SELL", (basePrice + priceOffset), -30, 15); lastAction = "T_SELL"; }
                }

                if (Date.now() - lastHeartbeat > 300000) { checkNews(); lastHeartbeat = Date.now(); }
            } catch (e) {}
        }

        async function checkNews() {
            tradeDirection = "SELL_ONLY";
            document.getElementById('forecastText').innerText = "KHÔNG OK (1:200)";
            document.getElementById('forecastText').style.color = "var(--red)";
            sendTele("🔮 [AI FORECAST] Tin 1:200 KHÔNG OK. Chỉ canh SELL.");
        }

        function sendAction(type, entry, tpD, slD) {
            let tp = (entry + tpD).toFixed(2);
            let sl = type.includes("SELL") ? (entry + slD).toFixed(2) : (entry - slD).toFixed(2);
            sendTele(`💎 [${type}]\n📍 Entry: ${entry.toFixed(2)}\n🎯 TP: ${tp}\n🛡️ SL: ${sl}\n⚠️ Lưu ý: Lãi 10 giá dời SL về Entry!`);
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        const m = u.message.text.toLowerCase();
                        if (m === "/start") {
                            isRunning = true; setInterval(updateData, 4000);
                            document.getElementById('botStatus').innerText = "🟢 BOT V12.3 ONLINE";
                            sendTele("🏆 GOLD V12.3 FIXED!\n- Lệnh /sync đã hoạt động.\n- AI Gemini 1.5 đã sẵn sàng.");
                        }
                        if (m.startsWith("/sync")) {
                            const mt5 = parseFloat(m.split(" ")[1]);
                            if (!isNaN(mt5)) {
                                priceOffset = mt5 - basePrice;
                                sendTele(`🎯 Đồng bộ thành công!\nGiá sàn MT5: ${mt5}\nChênh lệch đã nạp: ${priceOffset.toFixed(2)}`);
                            }
                        }
                        if (m === "/ping") sendTele(`✅ Bot ổn định.\nRSI: ${document.getElementById('rsiVal').innerText}\nSóng: ${document.getElementById('volatVal').innerText}`);
                    }
                }
            } catch (e) {}
        }

        function sendTele(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`); }
    </script>
</body>
</html>
