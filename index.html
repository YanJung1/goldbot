<script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0;
        let mode = "sideway", isTrading = false, side = "";
        let entry = 0, sl = 0, tps = [], hitTPs = [];
        let lastRSI = 50; // Lưu RSI vòng trước để so sánh lực quay đầu

        function initBot() {
            setInterval(updateData, 3000);
            setInterval(checkTele, 2000);
        }

        async function updateData() {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                basePrice = prices[prices.length - 1];
                
                const rsi = calculateRSI(prices);
                const volatility = Math.max(...prices.slice(-10)) - Math.min(...prices.slice(-10));
                const currentPrice = parseFloat((basePrice + priceOffset).toFixed(2));

                document.getElementById('goldPrice').innerText = currentPrice.toFixed(2);
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                document.getElementById('volVal').innerText = volatility.toFixed(1);

                if (!isTrading) {
                    checkSignals(rsi, currentPrice, volatility);
                } else {
                    monitorTrade(currentPrice, rsi);
                }
                lastRSI = rsi; // Cập nhật RSI cũ
            } catch (e) {}
        }

        function monitorTrade(p, rsi) {
            // 1. Kiểm tra Cắt lỗ / Hòa vốn
            if ((side === "BUY" && p <= sl) || (side === "SELL" && p >= sl)) {
                sendTele(`❌ KẾT THÚC: Giá chạm SL hoặc Entry (${p})`);
                closeTrade();
                return;
            }

            // 2. Kiểm tra các mốc TP
            tps.forEach((target, index) => {
                if (!hitTPs.includes(index)) {
                    let hit = (side === "BUY" && p >= target) || (side === "SELL" && p <= target);
                    if (hit) {
                        hitTPs.push(index);
                        document.getElementById(`tp-${index}`).classList.add('tp-hit');
                        sendTele(`✅ CHẠM TP${index + 1}: ${target}`);
                    }
                }
            });

            // 3. LOGIC CẢNH BÁO ĐẢO CHIỀU (QUAN TRỌNG)
            // Nếu đã đạt ít nhất TP2 và RSI quay đầu > 7 đơn vị
            if (hitTPs.length >= 2) {
                let reversal = false;
                if (side === "BUY" && (lastRSI - rsi) > 7) reversal = true; 
                if (side === "SELL" && (rsi - lastRSI) > 7) reversal = true;

                if (reversal) {
                    sendTele(`⚠️ CẢNH BÁO: Sóng đảo chiều mạnh tại ${p}! Không thể lên tới TP tiếp theo. NÊN ĐÓNG LỆNH NGAY.`);
                }
            }
        }

        function executeTrade(type, p, vol) {
            side = type; entry = p; isTrading = true; hitTPs = [];
            let step = vol > 6 ? 3.0 : 1.8; 
            sl = type === "BUY" ? entry - (step * 2.5) : entry + (step * 2.5);
            
            tps = [];
            for(let i=1; i<=6; i++) {
                let gap = i <= 3 ? (i * step) : (3 * step) + ((i-3) * step * 2);
                tps.push(parseFloat((type === "BUY" ? entry + gap : entry - gap).toFixed(2)));
            }
            renderTPs();
            sendTele(`🚀 LỆNH ${type}\n📍 Entry: ${entry}\n🛑 SL: ${sl.toFixed(2)}\n🎯 TP1: ${tps[0]} -> TP6: ${tps[5]}`);
        }

        function closeTrade() {
            isTrading = false;
            document.getElementById('tradeBox').style.display = "none";
        }

        function calculateRSI(p) {
            let g = 0, l = 0;
            for (let i = p.length - 14; i < p.length; i++) {
                let d = p[i] - p[i-1];
                if (d >= 0) g += d; else l -= d;
            }
            return 100 - (100 / (1 + (g / l)));
        }

        function renderTPs() {
            const list = document.getElementById('tpListUI');
            document.getElementById('tradeBox').style.display = "block";
            document.getElementById('posType').innerText = side;
            document.getElementById('enBox').innerText = entry;
            document.getElementById('slBox').innerText = sl.toFixed(2);
            list.innerHTML = tps.map((v, i) => `<div class="tp-item" id="tp-${i}">TP${i+1}: ${v}</div>`).join('');
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (!d.result) return;
                for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    const m = u.message.text.trim().toLowerCase();
                    if (m === "/slentry") { sl = entry; sendTele("🛡️ Đã dời SL về Entry."); }
                    if (m === "/done") { closeTrade(); sendTele("✅ Đã đóng lệnh tay."); }
                    if (m.startsWith("/sync")) { priceOffset = parseFloat(m.split(" ")[1]) - basePrice; sendTele("🎯 Đã Sync."); }
                }
            } catch (e) {}
        }

        function sendTele(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }
        
        function checkSignals(rsi, price, vol) {
            let buyL = (mode === "sideway") ? 30 : 42;
            let sellL = (mode === "sideway") ? 70 : 58;
            if (rsi < buyL) executeTrade("BUY", price, vol);
            else if (rsi > sellL) executeTrade("SELL", price, vol);
        }
    </script>
