<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO AI - V7 TREND FOLLOWER</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 20px; padding: 20px; background: var(--card); max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bot-title { color: var(--gold); font-size: 24px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        #botStatus { font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .status-off { color: var(--red); }
        .status-on { color: var(--green); }
        .price-container { background: #000; border-radius: 10px; padding: 20px; margin: 15px 0; }
        .price-label { font-size: 12px; color: #848e9c; text-transform: uppercase; }
        .price { font-size: 48px; font-weight: bold; color: var(--gold); }
        .indicators { display: flex; justify-content: space-around; font-size: 13px; color: #848e9c; margin-bottom: 15px; border-top: 1px solid #333; pt: 10px; }
        .indicator-box b { color: white; }
        .log-box { text-align: left; background: #000; padding: 15px; height: 180px; overflow-y: auto; font-size: 12px; color: var(--green); border: 1px solid #333; border-radius: 10px; line-height: 1.6; }
        .btn-sync { background: var(--gold); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body onload="initBot()">

    <div class="card">
        <div class="bot-title">👑 GOLD PRO V7</div>
        <div id="botStatus" class="status-off">🔴 GÕ /START TRÊN TELEGRAM ĐỂ KÍCH HOẠT</div>

        <div class="price-container">
            <div class="price-label">XAU/USD (Real-time)</div>
            <div id="goldPrice" class="price">0.00</div>
        </div>

        <div class="indicators">
            <div class="indicator-box">RSI (15m): <b id="rsiVal">--</b></div>
            <div class="indicator-box">Trend: <b id="trendVal">--</b></div>
        </div>

        <div id="logs" class="log-box">> Hệ thống đã sẵn sàng...<br>> Đang chờ kết nối Telegram...</div>
        
        <div style="font-size: 10px; color: #555; margin-top: 15px;">Target: TP 30 Giá | SL 15 Giá | Timeframe: 15M</div>
    </div>

    <script>
        // CẤU HÌNH BOT (Thay Token và ID của bạn vào đây)
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let isRunning = false;
        let lastUpdateId = 0;
        let priceOffset = 0;
        let currentPrice = 0;
        let lastAction = "";

        function initBot() {
            addLog("Đang khởi chạy listener...");
            setInterval(checkTele, 2000); // Kiểm tra lệnh Telegram mỗi 2 giây
        }

        async function updateData() {
            if (!isRunning) return;
            try {
                // Lấy dữ liệu nến 15 phút từ Binance (PAXGUSDT là token Gold khớp nhất)
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=200`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4])); // Lấy giá đóng cửa
                currentPrice = prices[prices.length - 1];

                // 1. TÍNH RSI (14)
                let gains = 0, losses = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    let diff = prices[i] - prices[i-1];
                    if (diff >= 0) gains += diff; else losses -= diff;
                }
                let rsi = 100 - (100 / (1 + (gains / losses)));

                // 2. TÍNH EMA 200 (Để xác định xu hướng dài hạn)
                let ema200 = prices.reduce((a, b) => a + b, 0) / prices.length;
                let isUptrend = currentPrice > ema200;

                // Cập nhật giao diện
                let displayPrice = (currentPrice + priceOffset).toFixed(2);
                document.getElementById('goldPrice').innerText = displayPrice;
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                document.getElementById('trendVal').innerText = isUptrend ? "TĂNG" : "GIẢM";
                document.getElementById('trendVal').style.color = isUptrend ? "#00ff88" : "#ff4d4d";

                // 3. LOGIC VÀO LỆNH (Tối ưu Winrate theo Trend)
                
                // Kèo BUY: Xu hướng TĂNG + RSI đi vào vùng quá bán (Pullback)
                if (isUptrend && rsi <= 35 && lastAction !== "BUY") {
                    let entry = parseFloat(displayPrice);
                    let tp = entry + 30; // TP 30 giá
                    let sl = entry - 15; // SL 15 giá
                    
                    let msg = `🔵 [GOLD BUY SIGNAL]\n📈 Trend: TĂNG (Thuận chiều)\n📍 Entry: ${entry}\n🎯 TP: ${tp.toFixed(2)}\n🛡️ SL: ${sl.toFixed(2)}\n📊 RSI: ${rsi.toFixed(2)}`;
                    sendTele(msg);
                    addLog("Phát hiện tín hiệu BUY. Đã gửi Telegram.");
                    lastAction = "BUY";
                }

                // Kèo SELL: Xu hướng GIẢM + RSI đi vào vùng quá mua (Hồi mã thương)
                else if (!isUptrend && rsi >= 65 && lastAction !== "SELL") {
                    let entry = parseFloat(displayPrice);
                    let tp = entry - 30; // TP 30 giá
                    let sl = entry + 15; // SL 15 giá
                    
                    let msg = `🔴 [GOLD SELL SIGNAL]\n📉 Trend: GIẢM (Thuận chiều)\n📍 Entry: ${entry}\n🎯 TP: ${tp.toFixed(2)}\n🛡️ SL: ${sl.toFixed(2)}\n📊 RSI: ${rsi.toFixed(2)}`;
                    sendTele(msg);
                    addLog("Phát hiện tín hiệu SELL. Đã gửi Telegram.");
                    lastAction = "SELL";
                }

            } catch (e) {
                console.error("Data Error:", e);
            }
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result && d.result.length > 0) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        if (!u.message || !u.message.text) continue;
                        const m = u.message.text.toLowerCase();

                        if (m === "/start") {
                            isRunning = true;
                            setInterval(updateData, 3000); // Cập nhật dữ liệu mỗi 3 giây
                            document.getElementById('botStatus').innerHTML = "🟢 BOT ĐANG QUÉT KÈO XAU/USD (M15)";
                            document.getElementById('botStatus').className = "status-on";
                            addLog("Bot đã được kích hoạt!");
                            sendTele("🚀 GOLD PRO V7 READY!\nĐang quét khung 15M thuận xu hướng.\nTP: 30 giá | SL: 15 giá.");
                        }
                        else if (m.startsWith("/sync")) {
                            let val = parseFloat(m.split(" ")[1]);
                            if (val) {
                                priceOffset = val - currentPrice;
                                addLog(`Đã Sync giá theo sàn: ${val}`);
                                sendTele(`🎯 Đã đồng bộ giá khớp với sàn của bạn: ${val}`);
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(m) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`);
        }

        function addLog(txt) {
            const logs = document.getElementById('logs');
            const now = new Date().toLocaleTimeString();
            logs.innerHTML += `<br>> [${now}] ${txt}`;
            logs.scrollTop = logs.scrollHeight;
        }
    </script>
</body>
</html>
