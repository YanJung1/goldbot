<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO V12.7 - TRACKING & SLE</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 450px; margin: 10px auto; }
        .price { font-size: 45px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .status-box { background: #000; padding: 10px; border-radius: 8px; font-size: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .log-box { text-align: left; background: #000; padding: 10px; height: 70px; overflow-y: auto; font-size: 11px; color: var(--green); border: 1px solid #333; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body onload="initBot()">

    <div class="card">
        <div style="color: var(--gold); font-weight: bold;">GOLD V12.7 - QUẢN LÝ KÈO CHUẨN</div>
        <div id="goldPrice" class="price">0.00</div>
        
        <div class="status-box">
            Trạng thái kèo: <b id="tradeStatus" style="color: var(--green);">ĐANG TRỐNG</b><br>
            SL Hiện tại: <b id="currentSL" style="color: var(--red);">--</b>
        </div>

        <div id="logs" class="log-box">> Hệ thống sẵn sàng...</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0;
        let entryPrice = 0, activeSL = null, isTrading = false;

        function initBot() { 
            setInterval(checkTele, 2000); 
            setInterval(updateData, 4000); 
        }

        async function updateData() {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=10`);
                const d = await r.json();
                basePrice = parseFloat(d[d.length - 1][4]);
                let displayPrice = (basePrice + priceOffset).toFixed(2);
                document.getElementById('goldPrice').innerText = displayPrice;

                // Tự động kiểm tra dính SL
                if (isTrading && activeSL) {
                    // Nếu là lệnh BUY (giá rớt xuống SL) hoặc SELL (giá vọt lên SL)
                    // Ở đây bot mặc định kiểm tra theo giá hiện tại
                    if (displayPrice == activeSL) {
                        sendTele(`🚨 KÈO ĐÃ KẾT THÚC: Dính SL/SLE tại ${activeSL}`);
                        resetTrade();
                    }
                }
            } catch (e) {}
        }

        function resetTrade() {
            isTrading = false; activeSL = null; entryPrice = 0;
            document.getElementById('tradeStatus').innerText = "ĐANG TRỐNG";
            document.getElementById('currentSL').innerText = "--";
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        const m = u.message.text.trim().toLowerCase();
                        
                        // 1. SYNC VÀ LƯU ENTRY
                        if (m.startsWith("/sync")) {
                            entryPrice = parseFloat(m.split(" ")[1]);
                            priceOffset = entryPrice - basePrice;
                            isTrading = true;
                            document.getElementById('tradeStatus').innerText = "ĐANG CHẠY";
                            sendTele(`🎯 Đã khớp Entry: ${entryPrice}. Bot bắt đầu theo dõi.`);
                        }

                        // 2. CÀI SL ENTRY THÔNG MINH (Ví dụ: /sle 1 -> Cách entry 1 giá)
                        if (m.startsWith("/sle")) {
                            if (!isTrading) return sendTele("⚠️ Không có kèo nào đang chạy!");
                            let offset = parseFloat(m.split(" ")[1]) || 0;
                            // Giả sử đang lãi, bot tự tính SL bảo vệ
                            activeSL = (entryPrice + offset).toFixed(2);
                            document.getElementById('currentSL').innerText = activeSL;
                            sendTele(`🛡️ Đã cài SL Entry: ${activeSL}. (Entry ${entryPrice} + ${offset})`);
                        }

                        // 3. XÁC NHẬN XONG KÈO (Dùng khi đã chốt tay hoặc dính TP)
                        if (m === "/done") {
                            resetTrade();
                            sendTele("✅ Đã xóa dữ liệu kèo cũ. Sẵn sàng cho kèo mới!");
                        }

                        if (m === "/ping") {
                            sendTele(`📊 Trạng thái: ${isTrading ? "Đang gồng" : "Đang trống"}\nEntry: ${entryPrice}\nSL: ${activeSL || "--"}`);
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`); }
    </script>
</body>
</html>
