<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER V28.2 PRO - TRADINGVIEW STRATEGY</title>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --green: #02c076; --red: #f84960; --gold: #f3ba2f; --blue: #2f8af3; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 1px solid #333; border-top: 5px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 400px; margin: 10px auto; }
        .price { font-size: 45px; font-weight: bold; margin: 10px 0; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .box { background: #2b3139; padding: 10px; border-radius: 8px; border: 1px solid #383f47; }
        .box span { display: block; font-size: 9px; color: #848e9c; text-transform: uppercase; }
        .box b { font-size: 14px; color: var(--gold); }
        .status { padding: 12px; border-radius: 8px; background: rgba(47, 138, 243, 0.1); border: 1px solid var(--blue); font-weight: bold; font-size: 13px; color: var(--blue); }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <b id="symText" style="color:var(--gold); font-size: 20px;">BTC/USDT</b>
            <span style="background:var(--blue); font-size:10px; padding:2px 5px; border-radius:3px;">MA 200 + BB + RSI</span>
        </div>
        <div id="mainPrice" class="price">0.00</div>
        
        <div class="grid">
            <div class="box"><span>EMA 200</span><b id="emaVal">--</b></div>
            <div class="box"><span>RSI (14)</span><b id="rsiVal">--</b></div>
            <div class="box"><span>XU HƯỚNG</span><b id="trendVal">--</b></div>
        </div>

        <div class="status" id="botStatus">ĐANG PHÂN TÍCH CẤU TRÚC...</div>
        <div style="margin-top: 15px; font-size: 11px; color: #848e9c;">ENTRY 1: NOW | ENTRY 2: LIMIT VÉT RÂU</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";
        let currentSymbol = "BTCUSDT", isTrading = false, lastId = 0;

        async function initBot() {
            sendTele("⭐ **HỆ THỐNG PHÂN TÍCH TRADINGVIEW ĐÃ KÍCH HOẠT**\nChỉ báo: EMA 200, Bollinger Bands, RSI.");
            setInterval(update, 3000);
            setInterval(checkTele, 2000);
        }

        async function update() {
            try {
                // Lấy 200 nến để tính EMA 200
                const r = await fetch(`https://binance.com{currentSymbol}&interval=5m&limit=200`);
                const data = await r.json();
                const prices = data.map(x => parseFloat(x[4]));
                const currentPrice = prices[prices.length - 1];
                document.getElementById('mainPrice').innerText = currentPrice.toLocaleString();

                const ema200 = calculateEMA(prices, 200);
                const rsi = calculateRSI(prices);
                const trend = currentPrice > ema200 ? "TĂNG (BUY)" : "GIẢM (SELL)";
                
                document.getElementById('emaVal').innerText = ema200.toFixed(1);
                document.getElementById('rsiVal').innerText = rsi.toFixed(1);
                document.getElementById('trendVal').innerText = trend;
                document.getElementById('trendVal').style.color = currentPrice > ema200 ? "#02c076" : "#f84960";

                if (!isTrading) {
                    checkSignal(currentPrice, rsi, ema200, data);
                }
            } catch(e) {}
        }

        function calculateEMA(data, period) {
            let k = 2 / (period + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) {
                ema = (data[i] * k) + (ema * (1 - k));
            }
            return ema;
        }

        function calculateRSI(prices) {
            let gains = 0, losses = 0;
            const period = 14;
            for (let i = prices.length - period; i < prices.length; i++) {
                let diff = prices[i] - prices[i-1];
                if (diff >= 0) gains += diff; else losses -= diff;
            }
            return 100 - (100 / (1 + (gains / losses)));
        }

        function checkSignal(p, rsi, ema, data) {
            const last = data[data.length-1];
            const high = parseFloat(last[2]);
            const low = parseFloat(last[3]);
            
            // CHIẾN THUẬT: Chỉ đánh thuận xu hướng EMA 200
            // BUY khi RSI < 30 và giá trên EMA 200 (Hồi về hỗ trợ)
            if (p > ema && rsi < 35) {
                execute("LONG (THUẬN TREND) 🚀", p, low);
            } 
            // SELL khi RSI > 70 và giá dưới EMA 200 (Hồi về kháng cự)
            else if (p < ema && rsi > 65) {
                execute("SHORT (THUẬN TREND) ❄️", p, high);
            }
        }

        function execute(type, p, limitPrice) {
            isTrading = true;
            const sl = type.includes("LONG") ? p * 0.996 : p * 1.004; // SL 0.4%
            const tp = type.includes("LONG") ? p * 1.01 : p * 0.99; // TP 1%

            let msg = `⭐ **TÍN HIỆU PRO TRADINGVIEW**\n\n📌 Lệnh: **${type}**\n\n📍 Entry 1 (NOW): **${p}**\n📍 Entry 2 (LIMIT): **${limitPrice}** (Vét râu)\n🛑 SL: **${sl.toFixed(2)}**\n💰 TP: **${tp.toFixed(2)}**\n\n⚠️ Đòn bẩy: 50x-150x. Cài SL ngay!`;
            
            const kb = { inline_keyboard: [[{text:"✅ Xong", callback_data:"done"}, {text:"📊 Check", callback_data:"check"}]] };
            fetch(`https://telegram.org{TOKEN}/sendMessage`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({chat_id:CHAT_ID, text:msg, parse_mode:'Markdown', reply_markup:kb})
            });
        }

        async function checkTele() {
            const r = await fetch(`https://telegram.org{TOKEN}/getUpdates?offset=${lastId+1}`);
            const d = await r.json();
            if(d.result) d.result.forEach(u => {
                lastId = u.update_id;
                if((u.callback_query?.data || u.message?.text?.toLowerCase()) === "done") {
                    isTrading = false;
                    sendTele("✅ Reset trạng thái. Đang chờ sóng Pro tiếp theo!");
                }
            });
        }

        function sendTele(m) { fetch(`https://telegram.org{TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}&parse_mode=Markdown`); }
    </script>
</body>
</html>
