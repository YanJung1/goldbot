<script>
    const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
    const CHAT_ID = "7994694689";

    let lastUpdateId = 0, priceOffset = 0, basePrice = 0;
    let isTrading = false, side = "", entry = 0, sl = 0, tps = [], hitTPs = [];
    let mode = "sideway", lastRSI = 50;

    function initBot() {
        // Khởi chạy ngay lập tức
        updateData();
        checkTele();
        // Cài đặt vòng lặp
        setInterval(updateData, 3000);
        setInterval(checkTele, 1500); // Check tin nhắn nhanh hơn (1.5 giây)
    }

    async function checkTele() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
            const d = await r.json();
            if (!d.result || d.result.length === 0) return;

            for (let u of d.result) {
                lastUpdateId = u.update_id;
                if (!u.message || !u.message.text) continue;
                
                const rawMsg = u.message.text.trim();
                const m = rawMsg.toLowerCase();
                
                // 1. ƯU TIÊN PHẢN HỒI LỆNH HỆ THỐNG
                if (m === "/start" || m === "/ping") {
                    const p = document.getElementById('goldPrice').innerText;
                    const rsi = document.getElementById('rsiVal').innerText;
                    sendTele(`⭐ GOLD PRO V14.2 ⭐\n💰 Giá Exness: ${p}\n📈 RSI: ${rsi}\n🤖 Chế độ: ${mode.toUpperCase()}\n📍 Trạng thái: ${isTrading ? "ĐANG GỒNG LỆNH" : "ĐANG TRỐNG"}`);
                    continue; 
                }

                // 2. LỆNH ĐIỀU KHIỂN
                if (m === "/trend") { mode = "trend"; document.getElementById('modeVal').innerText = "TREND"; sendTele("📉 Đã chuyển sang chế độ đánh TREND."); continue; }
                if (m === "/sideway") { mode = "sideway"; document.getElementById('modeVal').innerText = "SIDEWAY"; sendTele("↔️ Đã chuyển sang chế độ đánh SIDEWAY."); continue; }
                if (m === "/slentry") { sl = entry; sendTele("🛡️ Đã dời SL về Entry (Hòa vốn)."); continue; }
                if (m === "/done") { isTrading = false; document.getElementById('tradeUI').style.display = "none"; sendTele("✅ Đã xóa dữ liệu lệnh cũ."); continue; }

                // 3. LỆNH CÓ THAM SỐ (SYNC)
                if (m.startsWith("/sync")) {
                    let val = parseFloat(rawMsg.split(" ")[1]);
                    if (!isNaN(val)) {
                        priceOffset = val - basePrice;
                        sendTele(`🎯 Đã Sync thành công!\nGiá Exness: ${val}\nĐộ lệch (Offset): ${priceOffset.toFixed(2)}`);
                    }
                    continue;
                }
            }
        } catch (e) { console.error("Lỗi Telegram:", e); }
    }

    async function updateData() {
        try {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
            const d = await r.json();
            const prices = d.map(x => parseFloat(x[4]));
            basePrice = prices[prices.length - 1];
            
            const rsi = calcRSI(prices);
            const vol = Math.max(...prices.slice(-10)) - Math.min(...prices.slice(-10));
            const price = parseFloat((basePrice + priceOffset).toFixed(2));

            // Hiển thị Web
            document.getElementById('goldPrice').innerText = price.toFixed(2);
            document.getElementById('rsiVal').innerText = rsi.toFixed(2);
            document.getElementById('volVal').innerText = vol.toFixed(1);
            document.getElementById('botStatus').innerText = "ONLINE";

            // LOGIC TỰ ĐỘNG BẮN LỆNH
            if (!isTrading) {
                let buyLimit = (mode === "sideway") ? 30 : 42;
                let sellLimit = (mode === "sideway") ? 70 : 58;
                if (rsi < buyLimit) execute("BUY", price, vol);
                else if (rsi > sellLimit) execute("SELL", price, vol);
            } else {
                monitor(price, rsi);
            }
            lastRSI = rsi;
        } catch (e) { }
    }

    function execute(type, p, v) {
        side = type; entry = p; isTrading = true; hitTPs = [];
        let gap = v > 6 ? 3.5 : 2.0;
        sl = type === "BUY" ? entry - (gap * 3) : entry + (gap * 3);
        tps = [];
        for(let i=1; i<=6; i++) {
            let m = i <= 3 ? i : 3 + (i-3)*2;
            tps.push(parseFloat((type === "BUY" ? entry + (gap*m) : entry - (gap*m)).toFixed(2)));
        }
        showUI();
        sendTele(`🚀 LỆNH ${type} TỰ ĐỘNG\n📍 Entry: ${entry}\n🛑 SL: ${sl.toFixed(2)}\n🎯 TP1: ${tps[0]} -> TP6: ${tps[5]}`);
    }

    function monitor(p, rsi) {
        if ((side === "BUY" && p <= sl) || (side === "SELL" && p >= sl)) {
            sendTele(`❌ Lệnh đóng tại ${p} (Chạm SL/Entry)`);
            isTrading = false;
            document.getElementById('tradeUI').style.display = "none";
            return;
        }
        tps.forEach((target, i) => {
            if (!hitTPs.includes(i)) {
                let hit = (side === "BUY" && p >= target) || (side === "SELL" && p <= target);
                if (hit) {
                    hitTPs.push(i);
                    document.getElementById(`tp-${i}`).classList.add('hit');
                    sendTele(`✅ TP${i+1} HIT: ${target}`);
                }
            }
        });
        if (hitTPs.length >= 2) {
            let rev = (side === "BUY" && (lastRSI - rsi) > 7.5) || (side === "SELL" && (rsi - lastRSI) > 7.5);
            if (rev) sendTele(`⚠️ Cảnh báo gãy sóng! Nên chốt lãi tại ${p}.`);
        }
    }

    function calcRSI(p) {
        let g = 0, l = 0;
        for (let i = p.length - 14; i < p.length; i++) {
            let d = p[i] - p[i-1];
            if (d >= 0) g += d; else l -= d;
        }
        return 100 - (100 / (1 + (g / l)));
    }

    function showUI() {
        const ui = document.getElementById('tradeUI');
        if (ui) {
            ui.style.display = "block";
            document.getElementById('sideVal').innerText = side;
            document.getElementById('enVal').innerText = entry;
            document.getElementById('slVal').innerText = sl.toFixed(2);
            document.getElementById('tpGrid').innerHTML = tps.map((v, i) => `<div class="tp-box" id="tp-${i}">TP${i+1}: ${v}</div>`).join('');
        }
    }

    function sendTele(m) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`)
        .catch(e => console.error("Lỗi gửi tin:", e));
    }
</script>
