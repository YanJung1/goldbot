<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER V31 - MULTI-ASSET TRACKER</title>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --green: #02c076; --red: #f84960; --gold: #f3ba2f; --blue: #2f8af3; --pi: #6a1b9a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; }
        .card { border: 1px solid #333; border-top: 5px solid var(--gold); border-radius: 15px; padding: 15px; background: var(--card); max-width: 450px; margin: auto; }
        
        /* Cấu trúc 3 dòng chính */
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #2b3139; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #444; }
        .row.btc { border-left-color: var(--gold); }
        .row.eth { border-left-color: var(--blue); }
        .row.pi { border-left-color: var(--pi); }
        
        .info { text-align: left; }
        .info span { font-size: 10px; color: #848e9c; display: block; text-transform: uppercase; }
        .info b { font-size: 16px; display: block; }
        
        .stats { text-align: right; }
        .stats span { font-size: 9px; color: #848e9c; display: block; }
        .stats b { font-size: 12px; }

        .bot-status { font-size: 11px; color: var(--gold); margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <h3 style="margin: 0 0 15px 0; font-size: 16px; color: var(--gold);">⚡ HỆ THỐNG GIAO DỊCH V31.0</h3>

        <!-- Dòng 1: BTC -->
        <div class="row btc">
            <div class="info"><span>BTC/USDT</span><b id="priceBTC">0.00</b></div>
            <div class="stats"><span>RSI / LIQ</span><b id="statBTC">-- / --</b></div>
        </div>

        <!-- Dòng 2: ETH -->
        <div class="row eth">
            <div class="info"><span>ETH/USDT</span><b id="priceETH">0.00</b></div>
            <div class="stats"><span>RSI / LIQ</span><b id="statETH">-- / --</b></div>
        </div>

        <!-- Dòng 3: PI (Arbitrage) -->
        <div class="row pi">
            <div class="info"><span>PI (HTX/BIT)</span><b id="pricePI">0.00</b></div>
            <div class="stats"><span>CHÊNH LỆCH</span><b id="diffPI">0.00%</b></div>
        </div>

        <div class="bot-status" id="botStatus">ĐANG KHỞI TẠO TÍN HIỆU...</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function initBot() {
            updateData();
            setInterval(updateData, 6000); // 6 giây cập nhật để tránh lỗi rate limit
        }

        async function updateData() {
            try {
                // 1. Lấy giá BTC & ETH từ Binance
                const cryptoRes = await fetch('https://api1.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","ETHUSDT"]');
                const cryptoData = await cryptoRes.json();
                
                updateAsset("BTC", cryptoData[0]);
                updateAsset("ETH", cryptoData[1]);

                // 2. Lấy giá Pi (HTX & BitMart) qua Proxy
                fetchPi();

                document.getElementById('botStatus').innerText = "HỆ THỐNG ĐANG QUÉT ĐA KHUNG...";
            } catch (e) {
                document.getElementById('botStatus').innerText = "LỖI KẾT NỐI SÀN!";
            }
        }

        async function updateAsset(name, data) {
            const price = parseFloat(data.lastPrice);
            document.getElementById(`price${name}`).innerText = price.toLocaleString();
            
            // Lấy thêm nến để tính RSI & Liq cho dòng đó
            const kRes = await fetch(`https://api1.binance.com/api/v3/klines?symbol=${name}USDT&interval=5m&limit=20`);
            const kData = await kRes.json();
            const prices = kData.map(x => parseFloat(x[4]));
            const rsi = calculateRSI(prices);
            
            const lastLow = Math.min(...kData.slice(-10, -1).map(x => parseFloat(x[3])));
            const liq = parseFloat(kData[kData.length-1][3]) < lastLow ? "QUÉT 💧" : "ỔN";
            
            document.getElementById(`stat${name}`).innerText = `${rsi.toFixed(1)} / ${liq}`;
            
            // Bắn tín hiệu nếu chạm điều kiện (ví dụ RSI cực thấp)
            if (rsi < 25) sendTele(`🚀 **BÁO ĐỘNG ${name}**\nGiá: ${price}\nRSI: ${rsi.toFixed(1)} - QUÁ BÁN!`);
        }

        async function fetchPi() {
            try {
                const htx = await fetch(PROXY + encodeURIComponent("https://api.huobi.pro/market/detail/merged?symbol=piusdt"));
                const htxD = await htx.json();
                const pHTX = htxD.tick.close;
                
                const bit = await fetch(PROXY + encodeURIComponent("https://api.bitmart.com/spot/v1/ticker?symbol=PI_USDT"));
                const bitD = await bit.json();
                const pBit = parseFloat(bitD.data.tickers[0].last_price);

                const diff = ((pHTX - pBit) / pBit) * 100;

                document.getElementById('pricePI').innerText = `$${pHTX.toFixed(2)}`;
                document.getElementById('diffPI').innerText = `${diff.toFixed(2)}%`;
                document.getElementById('diffPI').style.color = Math.abs(diff) > 2 ? "#f84960" : "#02c076";
            } catch (e) {}
        }

        function calculateRSI(prices) {
            let gains = 0, losses = 0;
            for (let i = prices.length - 14; i < prices.length; i++) {
                let d = prices[i] - prices[i-1];
                if (d >= 0) gains += d; else losses -= d;
            }
            return 100 - (100 / (1 + (gains / (losses || 1))));
        }

        function sendTele(m) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}&parse_mode=Markdown`);
        }
    </script>
</body>
</html>
