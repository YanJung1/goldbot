<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL V36.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --card: #0d0e12; --green: #00ff88; --red: #ff3e3e; }
        body { background: var(--bg); color: #ececec; font-family: 'JetBrains Mono', monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .terminal { width: 100%; max-width: 450px; background: var(--card); border-radius: 12px; border: 1px solid #222; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; margin-bottom: 15px; }
        .coin-row { background: #14151a; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #333; }
        .price { font-size: 20px; font-weight: 800; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 8px; border-top: 1px solid #222; padding-top: 8px; }
        .val { font-size: 10px; font-weight: bold; color: #aaa; }
        button { background: #1a1a1a; color: var(--green); border: 1px solid var(--green); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 10px; margin-top: 10px; width: 100%; }
        button:active { background: var(--green); color: #000; }
        .blink { animation: b 1.5s infinite; } @keyframes b { 50% { opacity: 0.3; } }
    </style>
</head>
<body onload="init()">
    <div class="terminal">
        <div class="header">
            <span style="font-size:10px; color:#555;">PRO TERMINAL V36</span>
            <div id="clock" style="font-size:10px; color:var(--green);">00:00:00</div>
        </div>
        <div id="display"></div>
        <button onclick="testTele()">⚡ NHẤN ĐỂ KIỂM TRA KẾT NỐI TELEGRAM</button>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";
        const COINS = ["BTC", "ETH", "SOL", "BNB", "XRP", "ADA"];
        const COLORS = ["#f3ba2f", "#627eea", "#14f195", "#f0b90b", "#23292f", "#0033ad"];

        function init() {
            const container = document.getElementById('display');
            COINS.forEach((coin, i) => {
                container.innerHTML += `
                    <div class="coin-row" style="border-left-color: ${COLORS[i]}">
                        <div style="display:flex; justify-content:space-between">
                            <span style="color:${COLORS[i]}; font-weight:800">${coin}</span>
                            <span id="p${coin}" class="price">0.00</span>
                        </div>
                        <div class="grid">
                            <div><span style="font-size:8px; color:#444">RSI</span><br><span id="r${coin}" class="val">--</span></div>
                            <div><span style="font-size:8px; color:#444">LIQ</span><br><span id="l${coin}" class="val">STABLE</span></div>
                            <div style="text-align:right"><span id="s${coin}" style="font-size:9px; color:#444">WAIT</span></div>
                        </div>
                    </div>`;
            });
            update(); setInterval(update, 6000);
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
        }

        async function update() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","ADAUSDT"]`);
                const data = await res.json();
                for(let i=0; i<COINS.length; i++) {
                    const name = COINS[i], price = parseFloat(data[i].price);
                    document.getElementById(`p${name}`).innerText = price.toLocaleString();
                    
                    const k = await fetch(`https://api.binance.com/api/v3/klines?symbol=${name}USDT&interval=5m&limit=21`);
                    const kD = await k.json();
                    const closes = kD.map(x => parseFloat(x[4]));
                    const rsi = calcRSI(closes);
                    const isSweep = parseFloat(kD[kD.length-1][3]) < Math.min(...kD.slice(-12, -1).map(x => parseFloat(x[3])));

                    document.getElementById(`r${name}`).innerText = rsi.toFixed(1);
                    const lEl = document.getElementById(`l${name}`), sEl = document.getElementById(`s${name}`);

                    if (isSweep) { lEl.innerText = "SWEEP! 💧"; lEl.style.color = "var(--red)"; }
                    else { lEl.innerText = "STABLE"; lEl.style.color = "#444"; }

                    if (rsi < 28 && isSweep) {
                        sEl.innerText = "LONG 🚀"; sEl.style.color = "var(--green)";
                        sendTele(`🔥 **KÈO 150X: LONG ${name}**\nGiá: ${price}\nRSI: ${rsi.toFixed(1)}\n⚠️ Quét đáy thành công!`);
                    } else if (rsi > 72) {
                        sEl.innerText = "SHORT 🔻"; sEl.style.color = "var(--red)";
                    } else { sEl.innerText = "WAIT"; sEl.style.color = "#444"; }
                }
            } catch(e) {}
        }

        function calcRSI(c) {
            let g = 0, l = 0;
            for (let i = c.length - 14; i < c.length; i++) {
                let d = c[i] - c[i-1];
                if (d >= 0) g += d; else l -= d;
            }
            return 100 - (100 / (1 + (g / (l || 1))));
        }

        function sendTele(m) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}&parse_mode=Markdown`);
        }

        function testTele() {
            sendTele("🔔 **KẾT NỐI THÀNH CÔNG!**\nTerminal V36.0 đã sẵn sàng nhận lệnh.");
            alert("Đã gửi tin nhắn thử nghiệm! Hãy kiểm tra Telegram.");
        }
    </script>
</body>
</html>
