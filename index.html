<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO V14.6 - BINGX EDITION</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; --blue: #00d4ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 15px; background: var(--card); max-width: 400px; margin: 10px auto; }
        .price { font-size: 40px; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .status-msg { font-size: 11px; padding: 5px; border-radius: 5px; margin-top: 10px; background: rgba(0, 212, 255, 0.1); color: var(--blue); border: 1px solid var(--blue); }
        .tp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .tp-box { background: #2b3139; padding: 5px; font-size: 11px; border-radius: 4px; border-left: 2px solid var(--green); text-align: left; }
        .hit { background: var(--green) !important; color: black !important; font-weight: bold; }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <div style="font-size: 12px; color: var(--gold); margin-bottom: 5px;">BINGX TRADING SYSTEM - V14.6</div>
        <div id="goldPrice" class="price">0.00</div>
        <div style="font-size: 13px; color: #848e9c;">
            RSI: <b id="rsiVal">--</b> | Chế độ: <b id="modeVal">SIDEWAY</b>
        </div>
        
        <div id="scanStatus" class="status-msg">🔍 Đang quét giá BingX...</div>

        <div id="tradeUI" style="display:none; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
            <div style="font-weight:bold; color:var(--gold)"><span id="sideVal">--</span> @ <span id="enVal">--</span></div>
            <div style="color:var(--red); font-size:12px;">SL: <b id="slVal">--</b></div>
            <div class="tp-grid" id="tpGrid"></div>
        </div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0, lastRSI = 50;
        let isTrading = false, side = "", entry = 0, sl = 0, tps = [], hitTPs = [];
        let mode = "sideway", preAlertSent = false;

        function initBot() {
            setInterval(updateData, 3000);
            setInterval(checkTele, 1500);
            updateData();
        }

        async function updateData() {
            try {
                // Sử dụng PAXG/USDT làm tham chiếu giá Vàng thế giới chính xác nhất
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                basePrice = prices[prices.length - 1];
                
                const rsi = calcRSI(prices);
                let currentPrice = (basePrice + priceOffset);
                if (isNaN(currentPrice)) currentPrice = basePrice;

                document.getElementById('goldPrice').innerText = currentPrice.toFixed(2);
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);

                if (!isTrading) {
                    checkPreAlert(rsi);
                    let bL = (mode === "sideway") ? 30 : 42;
                    let sL = (mode === "sideway") ? 70 : 58;
                    if (rsi < bL) execute("BUY", currentPrice);
                    else if (rsi > sL) execute("SELL", currentPrice);
                } else {
                    monitor(currentPrice, rsi);
                }
                lastRSI = rsi;
            } catch (e) {}
        }

        function checkPreAlert(rsi) {
            const scanEl = document.getElementById('scanStatus');
            let buyZone = (mode === "sideway") ? 35 : 45;
            let sellZone = (mode === "sideway") ? 65 : 55;

            if (rsi <= buyZone && rsi > (buyZone - 5)) {
                scanEl.innerText = "👀 CHUẨN BỊ: Sắp có tín hiệu BUY trên BingX!";
                if (!preAlertSent) { sendTele("⚠️ BINGX ALERT: RSI đang thấp, chuẩn bị canh lệnh BUY!"); preAlertSent = true; }
            } else if (rsi >= sellZone && rsi < (sellZone + 5)) {
                scanEl.innerText = "👀 CHUẨN BỊ: Sắp có tín hiệu SELL trên BingX!";
                if (!preAlertSent) { sendTele("⚠️ BINGX ALERT: RSI đang cao, chuẩn bị canh lệnh SELL!"); preAlertSent = true; }
            } else {
                scanEl.innerText = "🔍 Đang quét tín hiệu BingX...";
                preAlertSent = false;
            }
        }

        function execute(type, p) {
            side = type; entry = p; isTrading = true; hitTPs = [];
            let gap = 3.5; // Khoảng cách TP tối ưu cho Vàng
            sl = type === "BUY" ? entry - 12 : entry + 12; // SL an toàn trên BingX
            tps = [];
            for(let i=1; i<=6; i++) {
                let v = type === "BUY" ? entry + (i*gap) : entry - (i*gap);
                tps.push(parseFloat(v.toFixed(2)));
            }
            document.getElementById('tradeUI').style.display = "block";
            document.getElementById('sideVal').innerText = side;
            document.getElementById('enVal').innerText = entry.toFixed(2);
            document.getElementById('slVal').innerText = sl.toFixed(2);
            document.getElementById('tpGrid').innerHTML = tps.map((v, i) => `<div class="tp-box" id="tp-${i}">TP${i+1}: ${v}</div>`).join('');
            
            sendTele(`🚀 LỆNH BINGX: ${type}\n📍 Entry: ${entry.toFixed(2)}\n🛑 SL: ${sl.toFixed(2)}\n🎯 TP1: ${tps[0]} -> TP6: ${tps[5]}`);
        }

        function monitor(p, rsi) {
            if ((side === "BUY" && p <= sl) || (side === "SELL" && p >= sl)) {
                sendTele(`❌ BINGX: Đóng lệnh (SL/Entry) @ ${p.toFixed(2)}`);
                isTrading = false;
                document.getElementById('tradeUI').style.display = "none";
                return;
            }
            tps.forEach((target, i) => {
                if (!hitTPs.includes(i)) {
                    let hit = (side === "BUY" && p >= target) || (side === "SELL" && p <= target);
                    if (hit) {
                        hitTPs.push(i);
                        document.getElementById(`tp-${i}`).classList.add('hit');
                        sendTele(`✅ BINGX: CHẠM TP${i+1} (${target})`);
                    }
                }
            });
            if (hitTPs.length >= 2) {
                let rev = (side === "BUY" && (lastRSI - rsi) > 8) || (side === "SELL" && (rsi - lastRSI) > 8);
                if (rev) sendTele(`⚠️ BINGX: Sóng yếu, nên chốt lãi sớm tại ${p.toFixed(2)}`);
            }
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (!d.result) return;
                for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    const m = u.message.text.trim().toLowerCase();
                    if (m === "/start" || m === "/ping") {
                        sendTele(`✅ BINGX BOT V14.6 LIVE\n💰 Giá hiện tại: ${document.getElementById('goldPrice').innerText}\n📈 RSI: ${document.getElementById('rsiVal').innerText}`);
                    }
                    if (m === "/slentry") { sl = entry; sendTele("🛡️ BingX: Đã dời SL về Entry."); }
                    if (m === "/trend") { mode = "trend"; document.getElementById('modeVal').innerText = "TREND"; sendTele("📉 Chế độ: TREND (Đánh theo sóng mạnh)"); }
                    if (m === "/sideway") { mode = "sideway"; document.getElementById('modeVal').innerText = "SIDEWAY"; sendTele("↔️ Chế độ: SIDEWAY (Đánh lướt sóng)"); }
                    if (m === "/done") { isTrading = false; document.getElementById('tradeUI').style.display = "none"; sendTele("✅ Đã xóa lệnh trên BingX."); }
                    if (m.startsWith("/sync")) {
                        let num = m.replace("/sync", "").trim();
                        let val = parseFloat(num);
                        if(!isNaN(val)) {
                            priceOffset = val - basePrice;
                            sendTele(`🎯 Đã khớp giá BingX: ${val}`);
                        }
                    }
                }
            } catch (e) {}
        }

        function calcRSI(p) {
            let g = 0, l = 0;
            for (let i = p.length - 14; i < p.length; i++) {
                let d = p[i] - p[i-1];
                if (d >= 0) g += d; else l -= d;
            }
            return 100 - (100 / (1 + (g / l)));
        }

        function sendTele(msg) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`); }
    </script>
</body>
</html>
