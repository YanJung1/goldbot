<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO V12.9 - ANTI-SLEEP</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 400px; margin: 10px auto; }
        .price { font-size: 40px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .status-tag { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: #333; }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <div style="color: var(--gold); font-size: 14px;">GOLD V12.9 - CHỐNG NGỦ ĐÔNG</div>
        <div id="botStatusTag" class="status-tag" style="color: var(--red);">OFFLINE</div>
        <div id="goldPrice" class="price">0.00</div>
        <div id="indicators" style="font-size: 12px; color: #848e9c;">
            RSI: <b id="rsiVal">--</b> | Biến động: <b id="volatVal">--</b>
        </div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0;
        let lastSignalType = "none"; 
        let mainLoop = null;

        function initBot() {
            console.log("Bot đang khởi tạo...");
            if (mainLoop) clearInterval(mainLoop);
            mainLoop = setInterval(updateData, 3000);
            setInterval(checkTele, 2000);
            updateData();
        }

        async function updateData() {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                basePrice = prices[prices.length - 1];
                
                let g = 0, l = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    let diff = prices[i] - prices[i-1];
                    if (diff >= 0) g += diff; else l -= diff;
                }
                const rsi = 100 - (100 / (1 + (g / l)));
                const range = Math.max(...prices.slice(-20)) - Math.min(...prices.slice(-20));

                const finalPrice = (basePrice + priceOffset).toFixed(2);
                document.getElementById('goldPrice').innerText = finalPrice;
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                document.getElementById('volatVal').innerText = range.toFixed(1);
                document.getElementById('botStatusTag').innerText = "ONLINE";
                document.getElementById('botStatusTag').style.color = "var(--green)";

                // TỰ ĐỘNG XUẤT LỆNH KHI RSI QUÁ MUA/QUÁ BÁN
                if (rsi > 70 && lastSignalType !== "SELL") {
                    sendTele(`🔴 TÍN HIỆU BÁN (SELL)\n💰 Giá: ${finalPrice}\n📈 RSI: ${rsi.toFixed(2)}`);
                    lastSignalType = "SELL";
                } else if (rsi < 30 && lastSignalType !== "BUY") {
                    sendTele(`🟢 TÍN HIỆU MUA (BUY)\n💰 Giá: ${finalPrice}\n📈 RSI: ${rsi.toFixed(2)}`);
                    lastSignalType = "BUY";
                } else if (rsi > 40 && rsi < 60) {
                    lastSignalType = "none"; // Reset để có thể bắt tín hiệu tiếp theo
                }

            } catch (e) { 
                document.getElementById('botStatusTag').innerText = "CONNECTING..."; 
            }
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result && d.result.length > 0) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        if (!u.message || !u.message.text) continue;
                        const m = u.message.text.trim().toLowerCase();
                        
                        if (m === "/start" || m === "/ping") {
                            sendTele(`✅ V12.9 Online\n💰 Giá: ${document.getElementById('goldPrice').innerText}\n📈 RSI: ${document.getElementById('rsiVal').innerText}`);
                        }
                        if (m.startsWith("/sync")) {
                            let p = parseFloat(m.split(" ")[1]);
                            if(!isNaN(p)) {
                                priceOffset = p - basePrice;
                                sendTele(`🎯 Đã Sync giá về: ${p}`);
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`)
            .catch(err => console.error("Lỗi gửi Tele:", err));
        }
    </script>
</body>
</html>
