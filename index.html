<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD BINGX V24.0 - WAVE & IMAGE MASTER</title>
    <style>
        :root { --bingx: #0052ff; --bg: #0b0e11; --card: #1e2329; --green: #00f0b5; --red: #ff3b30; --gold: #ffd700; --blue: #00d4ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 1px solid #333; border-top: 5px solid var(--green); border-radius: 15px; padding: 20px; background: var(--card); max-width: 420px; margin: 10px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .price { font-size: 55px; font-weight: bold; margin: 10px 0; color: white; }
        .mode-tag { display: inline-block; padding: 6px 15px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .mode-break { background: rgba(0, 212, 255, 0.2); color: var(--blue); border: 1px solid var(--blue); }
        .mode-sideway { background: rgba(255, 215, 0, 0.2); color: var(--gold); border: 1px solid var(--gold); }
        .trend-box { margin-top: 15px; padding: 12px; background: #161a1e; border-radius: 10px; font-size: 13px; border: 1px dashed #444; }
        .status { font-size: 11px; color: #848e9c; margin-top: 15px; }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <div id="modeTag" class="mode-tag mode-sideway">ĐANG PHÂN TÍCH SÓNG...</div>
        <div id="goldPrice" class="price">0.00</div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;">
            <div style="background: #2b3139; padding: 10px; border-radius: 8px;"><span>RSI (28/72)</span><br><b id="rsiVal">--</b></div>
            <div style="background: #2b3139; padding: 10px; border-radius: 8px;"><span>Lực Sóng</span><br><b id="wavePower">--</b></div>
        </div>

        <div class="trend-box">
            <span style="color: var(--green); font-size: 11px; font-weight: bold;">📊 TRENDLINE & MULTI-FRAME</span><br>
            <div id="multiTrend" style="margin-top: 5px;">H1: -- | H4: -- | D1: --</div>
            <div id="tlStatus" style="font-size: 10px; color: #848e9c; margin-top:5px;">Trendline: Đang vẽ...</div>
        </div>
        
        <div id="marketState" style="margin-top:15px; font-weight:bold; color:var(--gold)">Đang quét mô hình nến...</div>
        <div class="status">🛰️ Vệ tinh Trump & War đang hoạt động...</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";
        // Ảnh Dashboard chuyên nghiệp cho Plan sáng
        const PLAN_IMG = "https://i.ibb.co/L6M7XzY/gold-strategy-plan.jpg"; 

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0, isTrading = false;
        let lastBreakingNews = "", lastNewsId = "", h1Trend = "--", h4Trend = "--", d1Trend = "--";
        let activeTrade = null;

        function initBot() {
            updateData(); 
            setInterval(updateData, 2000); 
            setInterval(checkTeleCommands, 1500); 
            setInterval(scanWorldNews, 30000); 
            setInterval(fetchForexFactory, 600000); 
            setInterval(sendDailyPlan, 60000);
        }

        async function updateData() {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                const highs = d.map(x => parseFloat(x[2]));
                const lows = d.map(x => parseFloat(x[3]));
                const volumes = d.map(x => parseFloat(x[5]));
                
                basePrice = prices[prices.length - 1];
                const currentPrice = basePrice + priceOffset;
                document.getElementById('goldPrice').innerText = currentPrice.toFixed(2);

                const rsi = calcRSI(prices);
                const avgVol = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
                const volRatio = volumes[volumes.length - 1] / avgVol;

                // --- PHÂN TÍCH SÓNG (WAVE MOMENTUM) ---
                const wave = (currentPrice - prices[prices.length - 5]).toFixed(2);
                document.getElementById('wavePower').innerText = (wave > 0 ? "↑ " : "↓ ") + Math.abs(wave);

                // --- TRENDLINE BREAK ---
                const localHigh = Math.max(...highs.slice(-15, -1));
                const localLow = Math.min(...lows.slice(-15, -1));
                let tlStatus = "Đang tích lũy";
                if (currentPrice > localHigh) tlStatus = "PHÁ VỠ ĐỈNH 🚀";
                if (currentPrice < localLow) tlStatus = "PHÁ VỠ ĐÁY 📉";
                document.getElementById('tlStatus').innerText = `Trendline: ${tlStatus}`;

                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                await updateMultiTrends();
                document.getElementById('multiTrend').innerText = `H1: ${h1Trend} | H4: ${h4Trend} | D1: ${d1Trend}`;

                // --- NHẬN DIỆN & BÁO NẾN MÔ HÌNH ---
                const candlePattern = recognizePattern(d[d.length-1], d[d.length-2]);
                if (candlePattern && !isTrading) {
                    document.getElementById('marketState').innerText = candlePattern;
                    // Nếu nến mạnh xuất hiện ở vùng nhạy cảm, báo Tele ngay
                    if (rsi < 30 || rsi > 70) sendTele(`🕯️ **MÔ HÌNH NẾN XUẤT HIỆN:** ${candlePattern}\n📍 Giá: ${currentPrice.toFixed(2)}\n💎 Cơ hội đảo chiều cao!`);
                }

                if (isTrading && activeTrade) checkLiveResult(currentPrice);

                if (!isTrading) {
                    if (volRatio > 1.4 && (currentPrice > localHigh || currentPrice < localLow)) {
                        executeLayered(currentPrice > localHigh ? "BUY" : "SELL", "BREAKOUT SÓNG ⚡", 30, [50, 80, 150], candlePattern);
                    } else if (rsi < 28 || rsi > 72) {
                        executeLayered(rsi < 28 ? "BUY" : "SELL", "SIDEWAY (NHẠY)", 15, [15, 22, 30], candlePattern);
                    }
                }
            } catch (e) {}
        }

        function executeLayered(type, mode, sl, tps, pattern) {
            isTrading = true;
            const p = basePrice + priceOffset;
            const e1 = p, e2 = (type === "BUY") ? p - 5.0 : p + 5.0;
            const stopLoss = (type === "BUY") ? e2 - sl : e2 + sl;
            activeTrade = { type, entry: e1, entry2: e2, sl: stopLoss, tp1: (type==="BUY"?p+tps[0]:p-tps[0]), status: "OPEN" };

            let msg = `⚔️ **LỆNH CHIẾN ĐẤU V24.0**\n\n`;
            msg += `🎯 Lệnh: **${type}**\n📌 Mode: ${mode}\n🕯️ Nến: ${pattern || "Chuẩn"}\n\n`;
            msg += `📍 ENTRY 1: **${e1.toFixed(2)}**\n📍 ENTRY 2: **${e2.toFixed(2)}**\n🛑 SL TỔNG: ${stopLoss.toFixed(2)}\n`;
            msg += `💰 TP: ${(type==="BUY"?p+tps[0]:p-tps[0]).toFixed(2)} -> ${(type==="BUY"?p+tps[2]:p-tps[2]).toFixed(2)}\n\n`;
            msg += `📊 Xu hướng: H1 ${h1Trend} | H4 ${h4Trend} | D1 ${d1Trend}`;
            sendTele(msg);
        }

        function checkLiveResult(cp) {
            const t = activeTrade;
            if ((t.type === "BUY" && cp <= t.sl) || (t.type === "SELL" && cp >= t.sl)) {
                sendTele(`❌ **CHẠM SL!**\nGiá: ${cp.toFixed(2)}\n*Gõ /done để tìm kèo mới.*`);
                isTrading = false; activeTrade = null;
            }
            if (t.status === "OPEN" && ((t.type === "BUY" && cp >= t.tp1) || (t.type === "SELL" && cp <= t.tp1))) {
                sendTele(`💰 **CHẠM TP1!**\nLụm lúa và dời SL về Entry 1 thôi bro!`);
                t.status = "TP1_HIT";
            }
        }

        async function sendDailyPlan() {
            const now = new Date();
            if (now.getHours() === 6 && now.getMinutes() === 30) {
                const p = (basePrice + priceOffset).toFixed(2);
                let caption = `☀️ **BẢN ĐỒ CHIẾN THUẬT NGÀY**\n\n💰 Giá Pivot: ${p}\n📊 H1: ${h1Trend} | H4: ${h4Trend} | D1: ${d1Trend}\n\n🚀 **Kế hoạch:**\n- Ưu tiên Breakout nếu Vol > 1.4\n- Quét Sideway biên độ 15-30 giá\n⚠️ Cảnh giác tin Trump/War!`;
                
                // Gửi Ảnh kèm nội dung Plan
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto?chat_id=${CHAT_ID}&photo=${PLAN_IMG}&caption=${encodeURIComponent(caption)}&parse_mode=Markdown`);
            }
        }

        async function updateMultiTrends() {
            try {
                const intervals = ['1h', '4h', '1d'];
                const results = await Promise.all(intervals.map(i => fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=${i}&limit=20`).then(r => r.json())));
                h1Trend = getEmaTrend(results[0]); h4Trend = getEmaTrend(results[1]); d1Trend = getEmaTrend(results[2]);
            } catch (e) {}
        }

        function getEmaTrend(data) {
            const closes = data.map(x => parseFloat(x[4]));
            const ema = closes.reduce((a, b) => a + b, 0) / closes.length;
            return closes[closes.length - 1] > ema ? "TĂNG ↑" : "GIẢM ↓";
        }

        function recognizePattern(c, p) {
            const o = parseFloat(c[1]), cl = parseFloat(c[4]), po = parseFloat(p[1]), pcl = parseFloat(p[4]);
            if (cl > o && (cl - o) > Math.abs(po - pcl) * 1.2 && cl > po) return "Nhấn Chìm Tăng 🔥";
            if (o > cl && (o - cl) > Math.abs(po - pcl) * 1.2 && cl < po) return "Nhấn Chìm Giảm ❄️";
            return "";
        }

        async function scanWorldNews() {
            try {
                const r = await fetch('https://min-api.cryptocompare.com/data/v2/news/?lang=EN');
                const d = await r.json();
                const latest = d.Data[0];
                if (latest && latest.id !== lastBreakingNews) {
                    const txt = (latest.title + latest.body).toLowerCase();
                    if (['war','trump','tariff','nuclear','attack'].some(k => txt.includes(k))) {
                        sendTele(`🚨 **TIN NÓNG:** ${latest.title}`);
                        lastBreakingNews = latest.id;
                    }
                }
            } catch (e) {}
        }

        async function checkTeleCommands() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId+1}&timeout=1`);
                const d = await r.json();
                if (d.result) for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    const m = u.message.text.trim().toLowerCase();
                    if (m === "/ping") sendTele(`✅ BOT LIVE - H4: ${h4Trend}`);
                    if (m === "/done") { isTrading = false; activeTrade = null; sendTele("✅ Reset thành công!"); }
                    if (m.startsWith("/sync")) { priceOffset = parseFloat(m.replace("/sync","")) - basePrice; sendTele("🎯 Khớp giá thành công!"); }
                }
            } catch (e) {}
        }

        function calcRSI(p) {
            let g = 0, l = 0;
            for (let i = p.length - 14; i < p.length; i++) {
                let d = p[i] - p[i-1];
                if (d >= 0) g += d; else l -= d;
            }
            return 100 - (100 / (1 + (g / (l || 1))));
        }

        function sendTele(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }
    </script>
</body>
</html>
