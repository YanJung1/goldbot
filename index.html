<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO V8 - TREND & HEARTBEAT</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 450px; margin: 10px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price { font-size: 45px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .status-on { color: var(--green); font-weight: bold; font-size: 13px; }
        .indicators { display: flex; justify-content: space-around; font-size: 13px; color: #848e9c; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .log-box { text-align: left; background: #000; padding: 10px; height: 150px; overflow-y: auto; font-size: 11px; color: var(--green); border: 1px solid #333; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body onload="initBot()">

    <div class="card">
        <div style="color: var(--gold); font-weight: bold; letter-spacing: 1px;">GOLD RECOVERY AI V8</div>
        <div id="botStatus" style="color: var(--red); margin: 10px 0;">🔴 CHỜ KÍCH HOẠT /START</div>
        
        <div id="goldPrice" class="price">0.00</div>
        
        <div class="indicators">
            <div>RSI (15m): <b id="rsiVal" style="color: white;">--</b></div>
            <div>Trend: <b id="trendVal">--</b></div>
        </div>

        <div id="logs" class="log-box">> Hệ thống sẵn sàng...</div>
    </div>

    <script>
        // CẤU HÌNH BOT - GIỮ NGUYÊN TOKEN CỦA BẠN
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let isRunning = false, lastUpdateId = 0, priceOffset = 0;
        let currentPrice = 0, currentRsi = 0, lastAction = "";
        let lastHeartbeat = 0; // Biến theo dõi báo cáo 60p

        function initBot() { setInterval(checkTele, 2000); }

        async function updateData() {
            if (!isRunning) return;
            try {
                // Lấy nến 15 phút (M15) để tăng Winrate
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=200`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                currentPrice = prices[prices.length - 1];

                // Tính RSI (14)
                let g = 0, l = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    let diff = prices[i] - prices[i-1];
                    if (diff >= 0) g += diff; else l -= diff;
                }
                currentRsi = 100 - (100 / (1 + (g / l)));

                // Xác định xu hướng bằng EMA 200
                const ema200 = prices.reduce((a, b) => a + b, 0) / prices.length;
                const isUptrend = currentPrice > ema200;

                // Cập nhật giao diện
                let displayPrice = (currentPrice + priceOffset).toFixed(2);
                document.getElementById('goldPrice').innerText = displayPrice;
                document.getElementById('rsiVal').innerText = currentRsi.toFixed(2);
                document.getElementById('trendVal').innerText = isUptrend ? "TĂNG" : "GIẢM";
                document.getElementById('trendVal').style.color = isUptrend ? "#00ff88" : "#ff4d4d";

                // --- TÍNH NĂNG BÁO CÁO NHỊP ĐẬP (60 PHÚT/LẦN) ---
                let now = Date.now();
                if (now - lastHeartbeat > 3600000) { 
                    sendTele(`🤖 [SYSTEM CHECK]\n✅ Bot vẫn đang quét kèo Gold...\n📊 RSI: ${currentRsi.toFixed(2)}\n📈 Trend: ${isUptrend ? 'TĂNG' : 'GIẢM'}\n📍 Giá sàn: ${displayPrice}`);
                    lastHeartbeat = now;
                }

                // --- LOGIC VÀO LỆNH THUẬN XU HƯỚNG ---
                // BUY: Xu hướng TĂNG + RSI hồi về vùng quá bán (<= 40)
                if (isUptrend && currentRsi <= 40 && lastAction !== "BUY") {
                    let entry = parseFloat(displayPrice);
                    let tp = entry + 30; // TP 30 giá
                    let sl = entry - 15; // SL 15 giá
                    sendTele(`🔵 [GOLD BUY SIGNAL]\n📈 Xu hướng: TĂNG (EMA200)\n📍 Entry: ${entry}\n🎯 TP: ${tp.toFixed(2)}\n🛡️ SL: ${sl.toFixed(2)}\n📊 RSI: ${currentRsi.toFixed(2)}`);
                    lastAction = "BUY";
                } 
                // SELL: Xu hướng GIẢM + RSI hồi lên vùng quá mua (>= 60)
                else if (!isUptrend && currentRsi >= 60 && lastAction !== "SELL") {
                    let entry = parseFloat(displayPrice);
                    let tp = entry - 30; 
                    let sl = entry + 15;
                    sendTele(`🔴 [GOLD SELL SIGNAL]\n📉 Xu hướng: GIẢM (EMA200)\n📍 Entry: ${entry}\n🎯 TP: ${tp.toFixed(2)}\n🛡️ SL: ${sl.toFixed(2)}\n📊 RSI: ${currentRsi.toFixed(2)}`);
                    lastAction = "SELL";
                }
            } catch (e) {}
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result && d.result.length > 0) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        if (!u.message || !u.message.text) continue;
                        const m = u.message.text.toLowerCase();

                        if (m === "/start") {
                            if (!isRunning) {
                                isRunning = true;
                                setInterval(updateData, 3000);
                                document.getElementById('botStatus').innerHTML = "🟢 BOT ĐANG QUÉT KÈO VÀNG (M15)...";
                                document.getElementById('botStatus').className = "status-on";
                                sendTele("🏆 GOLD BOT V8 READY!\nTP: 30 GIÁ | SL: 15 GIÁ.\nBot sẽ báo cáo tình trạng mỗi 60 phút.");
                                addLog("Bot khởi động thành công!");
                            }
                        }
                        else if (m.startsWith("/sync")) {
                            let mt5 = parseFloat(m.split(" ")[1]);
                            if (mt5) { priceOffset = mt5 - currentPrice; sendTele(`🎯 Đã đồng bộ giá MT5: ${mt5}`); addLog("Đã Sync giá sàn."); }
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`); }
        function addLog(t) { 
            const lb = document.getElementById('logs');
            lb.innerHTML += `<br>> ${t}`; lb.scrollTop = lb.scrollHeight;
        }
    </script>
</body>
</html>
