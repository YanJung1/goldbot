<script>
    const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
    const CHAT_ID = "7994694689";

    let lastUpdateId = 0, priceOffset = 0, basePrice = 0;
    let entryPrice = 0, isTrading = false;
    let mainLoop = null;
    
    // Biến chặn để tránh spam tin nhắn
    let lastSignalType = "none"; 

    function initBot() {
        if (mainLoop) clearInterval(mainLoop);
        mainLoop = setInterval(updateData, 3000); // Cập nhật dữ liệu mỗi 3s
        setInterval(checkTele, 2000); // Kiểm tra lệnh Telegram mỗi 2s
        updateData();
    }

    async function updateData() {
        try {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=50`);
            const d = await r.json();
            const prices = d.map(x => parseFloat(x[4]));
            basePrice = prices[prices.length - 1];
            
            let g = 0, l = 0;
            for (let i = prices.length - 14; i < prices.length; i++) {
                let diff = prices[i] - prices[i-1];
                if (diff >= 0) g += diff; else l -= diff;
            }
            const rsi = 100 - (100 / (1 + (g / l)));
            const range = Math.max(...prices.slice(-20)) - Math.min(...prices.slice(-20));

            const finalPrice = (basePrice + priceOffset).toFixed(2);
            document.getElementById('goldPrice').innerText = finalPrice;
            document.getElementById('rsiVal').innerText = rsi.toFixed(2);
            document.getElementById('volatVal').innerText = range.toFixed(1);
            document.getElementById('botStatusTag').innerText = "ONLINE";
            document.getElementById('botStatusTag').style.color = "var(--green)";

            // --- LOGIC TỰ ĐỘNG XUẤT LỆNH ---
            checkAutoSignal(rsi, finalPrice);

        } catch (e) { 
            document.getElementById('botStatusTag').innerText = "CONNECTING..."; 
        }
    }

    function checkAutoSignal(rsi, price) {
        // Điều kiện Bán (RSI > 70)
        if (rsi > 70 && lastSignalType !== "SELL") {
            sendTele(`🔴 TÍN HIỆU BÁN (SELL)\n💰 Giá: ${price}\n📈 RSI: ${rsi.toFixed(2)}\n⚠️ Quá mua!`);
            lastSignalType = "SELL";
        } 
        // Điều kiện Mua (RSI < 30)
        else if (rsi < 30 && lastSignalType !== "BUY") {
            sendTele(`🟢 TÍN HIỆU MUA (BUY)\n💰 Giá: ${price}\n📈 RSI: ${rsi.toFixed(2)}\n📉 Quá bán!`);
            lastSignalType = "BUY";
        }
        // Reset trạng thái khi RSI về vùng an toàn (tùy chọn)
        else if (rsi > 45 && rsi < 55) {
            lastSignalType = "none";
        }
    }

    async function checkTele() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
            const d = await r.json();
            if (d.result && d.result.length > 0) {
                for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    if(!u.message) continue;
                    const m = u.message.text.trim().toLowerCase();
                    
                    if (m === "/start" || m === "/ping") {
                        const rsi = document.getElementById('rsiVal').innerText;
                        const p = document.getElementById('goldPrice').innerText;
                        sendTele(`✅ Bot V12.9 Online\n💰 Giá: ${p}\n📈 RSI: ${rsi}`);
                    }

                    if (m.startsWith("/sync")) {
                        const val = parseFloat(m.split(" ")[1]);
                        if(!isNaN(val)) {
                            entryPrice = val;
                            priceOffset = entryPrice - basePrice;
                            isTrading = true;
                            sendTele(`🎯 Đã Sync Entry: ${entryPrice}`);
                        }
                    }

                    if (m === "/done") {
                        isTrading = false; entryPrice = 0;
                        sendTele("✅ Kèo đã kết thúc.");
                    }
                }
            }
        } catch (e) {}
    }

    function sendTele(m) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`);
    }
</script>
