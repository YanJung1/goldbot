<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRO V11 - AI NEWS & DIRECTIONAL LOCK</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 450px; margin: 10px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price { font-size: 45px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .mode-box { background: #000; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; border: 1px solid #444; }
        .indicators { display: flex; justify-content: space-around; font-size: 13px; color: #848e9c; border-top: 1px solid #333; padding-top: 10px; }
        .log-box { text-align: left; background: #000; padding: 10px; height: 120px; overflow-y: auto; font-size: 11px; color: var(--green); border: 1px solid #333; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body onload="initBot()">

    <div class="card">
        <div style="color: var(--gold); font-weight: bold; font-size: 18px;">GOLD ULTIMATE V11</div>
        <div id="botStatus" style="color: var(--red); margin: 5px 0; font-size: 12px;">🔴 CHỜ KÍCH HOẠT /START</div>
        
        <div id="goldPrice" class="price">0.00</div>
        
        <div id="newsMode" class="mode-box">
            Chế độ: <b style="color: var(--green);">BÌNH THƯỜNG</b><br>
            <small>Đang chờ tin tức tác động...</small>
        </div>

        <div class="indicators">
            <div>RSI: <b id="rsiVal" style="color: white;">--</b></div>
            <div>Trend: <b id="trendVal">--</b></div>
        </div>
        <div id="logs" class="log-box">> Hệ thống AI đang nạp dữ liệu...</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let isRunning = false, lastUpdateId = 0, priceOffset = 0;
        let lastAction = "", lastHeartbeat = Date.now();
        let tradeDirection = "BOTH"; // BOTH, BUY_ONLY, SELL_ONLY

        function initBot() { setInterval(checkTele, 2000); }

        async function updateData() {
            if (!isRunning) return;
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=200`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                const currentPrice = prices[prices.length - 1];
                const isGreen = currentPrice > prices[prices.length - 2];

                // Tính RSI & EMA
                let g = 0, l = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    let diff = prices[i] - prices[i-1];
                    if (diff >= 0) g += diff; else l -= diff;
                }
                const rsi = 100 - (100 / (1 + (g / l)));
                const ema200 = prices.reduce((a, b) => a + b, 0) / prices.length;
                const isUptrend = currentPrice > ema200;

                // Cập nhật UI
                let displayPrice = (currentPrice + priceOffset).toFixed(2);
                document.getElementById('goldPrice').innerText = displayPrice;
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                document.getElementById('trendVal').innerText = isUptrend ? "TĂNG" : "GIẢM";
                document.getElementById('trendVal').style.color = isUptrend ? "#00ff88" : "#ff4d4d";

                // --- LOGIC VÀO LỆNH THÔNG MINH (KẾT HỢP TIN TỨC) ---
                
                // Lệnh BUY: Chỉ vào nếu Trend TĂNG + RSI thấp + Ko bị khóa chiều Sell_Only
                if (tradeDirection !== "SELL_ONLY" && isUptrend && rsi <= 38 && isGreen && lastAction !== "BUY") {
                    sendTele(`🔵 [BUY SIGNAL]\n💎 Tin tức: ${tradeDirection === "BUY_ONLY" ? "TỐT" : "ỔN ĐỊNH"}\n📊 RSI: ${rsi.toFixed(2)}\n📍 Entry: ${displayPrice}\n🎯 TP: ${(parseFloat(displayPrice)+30).toFixed(2)}\n🛡️ SL: ${(parseFloat(displayPrice)-15).toFixed(2)}`);
                    lastAction = "BUY";
                } 
                
                // Lệnh SELL: Chỉ vào nếu Trend GIẢM + RSI cao + Ko bị khóa chiều Buy_Only
                else if (tradeDirection !== "BUY_ONLY" && !isUptrend && rsi >= 62 && !isGreen && lastAction !== "SELL") {
                    sendTele(`🔴 [SELL SIGNAL]\n💎 Tin tức: ${tradeDirection === "SELL_ONLY" ? "XẤU" : "ỔN ĐỊNH"}\n📊 RSI: ${rsi.toFixed(2)}\n📍 Entry: ${displayPrice}\n🎯 TP: ${(parseFloat(displayPrice)-30).toFixed(2)}\n🛡️ SL: ${(parseFloat(displayPrice)+15).toFixed(2)}`);
                    lastAction = "SELL";
                }

                // Quét tin tức mỗi 5 phút
                if (Date.now() - lastHeartbeat > 300000) { 
                    checkNewsImpact();
                    lastHeartbeat = Date.now();
                }

            } catch (e) { console.log(e); }
        }

        async function checkNewsImpact() {
            addLog("Đang phân tích tin tức đòn bẩy & kinh tế...");
            // Giả lập nhận diện tin đòn bẩy 1:200
            let newsTitle = "Brokers reduce Gold leverage to 1:200"; // Giả sử quét được
            
            if (newsTitle.toLowerCase().includes("leverage") && newsTitle.includes("200")) {
                tradeDirection = "SELL_ONLY";
                document.getElementById('newsMode').innerHTML = `Chế độ: <b style="color: var(--red);">CHỈ SELL (TIN XẤU)</b><br><small>Hạn chế đòn bẩy -> Áp lực bán tháo.</small>`;
                sendTele(`⚠️ [PHÂN TÍCH TIN TỨC]\n📄 Tin: Giảm đòn bẩy xuống 1:200.\n🧠 Nhận định: XẤU (Hạn chế sức mua, trader bị ép bán).\n🚫 Hành động: BOT KHÓA CHIỀU BUY, CHỈ TÌM ĐIỂM SELL.`);
            }
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        const m = u.message.text.toLowerCase();
                        if (m === "/start") {
                            isRunning = true; setInterval(updateData, 4000);
                            document.getElementById('botStatus').innerText = "🟢 BOT ĐANG CHẠY V11";
                            sendTele("🚀 GOLD PRO V11 ONLINE!\n- Tự động phân tích tin đòn bẩy.\n- Khóa chiều giao dịch khi tin xấu.");
                        }
                        if (m === "/ping") sendTele("✅ Pong! Bot V11 đang đọc tin & quét kèo.");
                        if (m.startsWith("/sync")) {
                            let mt5 = parseFloat(m.split(" ")[1]);
                            if (mt5) { priceOffset = mt5 - (currentPrice || mt5); sendTele("🎯 Sync OK!"); }
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`); }
        function addLog(t) { document.getElementById('logs').innerHTML += `<br>> ${t}`; }
    </script>
</body>
</html>
