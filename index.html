<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GOLD PRO V12.3 - FIX AI</title>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1e2329; --green: #00ff88; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 450px; margin: 10px auto; }
        .price { font-size: 45px; font-weight: bold; color: var(--gold); }
        .chat-container { background: #161a1e; border-radius: 10px; padding: 10px; margin-top: 20px; text-align: left; }
        #chatBox { height: 120px; overflow-y: auto; font-size: 12px; border-bottom: 1px solid #333; margin-bottom: 10px; color: #ccc; }
        .chat-input { display: flex; gap: 5px; }
        input { flex: 1; background: #2b3139; border: none; color: white; padding: 10px; border-radius: 5px; }
        button { background: var(--gold); border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="initBot()">

    <div class="card">
        <div style="color: var(--gold); font-weight: bold;">GOLD V12.3 - AI TRADER</div>
        <div id="goldPrice" class="price">0.00</div>
        
        <div style="display: flex; justify-content: space-around; font-size: 13px; margin: 10px 0;">
            <div>RSI: <b id="rsiVal">--</b></div>
            <div>Biến động: <b id="volatVal">--</b></div>
        </div>

        <div class="chat-container">
            <div style="font-size: 11px; color: var(--gold); margin-bottom: 5px;">🤖 HỎI AI CAO THỦ:</div>
            <div id="chatBox">Đang kết nối bộ não AI...</div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Vàng sập hay bay bro?">
                <button onclick="askAI()">Hỏi</button>
            </div>
        </div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";
        const GEMINI_API_KEY = "AIzaSyCGG2W6jOSjJamkPx0-2eo4qkotbr7RDXE"; // Đã dán Key của bạn

        let isRunning = false, lastUpdateId = 0, priceOffset = 0, lastAction = "";
        let currentRSI = "--", currentRange = "--";

        function initBot() { setInterval(checkTele, 2000); }

        async function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (!input.value) return;

            const userMsg = input.value;
            chatBox.innerHTML += `<br><b style="color:var(--gold)">Bạn:</b> ${userMsg}`;
            input.value = "";

            try {
                // Sử dụng model 1.5-flash cho Key mới của bạn
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Bạn là cao thủ trade vàng, hãy trả lời ngắn và chất: " + userMsg }] }] })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<br><b style="color:var(--green)">AI:</b> ${aiMsg}`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<br><i style="color:red">Lỗi kết nối AI. Thử lại sau 1 phút.</i>`;
            }
        }

        async function updateData() {
            if (!isRunning) return;
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=200`);
                const d = await r.json();
                const prices = d.map(x => parseFloat(x[4]));
                const currentPrice = prices[prices.length - 1];

                let g = 0, l = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    let diff = prices[i] - prices[i-1];
                    if (diff >= 0) g += diff; else l -= diff;
                }
                const rsi = 100 - (100 / (1 + (g / l)));
                const range = Math.max(...prices.slice(-20)) - Math.min(...prices.slice(-20));

                currentRSI = rsi.toFixed(2);
                currentRange = range.toFixed(1);
                document.getElementById('goldPrice').innerText = (currentPrice + priceOffset).toFixed(2);
                document.getElementById('rsiVal').innerText = currentRSI;
                document.getElementById('volatVal').innerText = currentRange;

            } catch (e) {}
        }

        async function checkTele() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        const m = u.message.text.toLowerCase();
                        if (m === "/start") {
                            isRunning = true; 
                            setInterval(updateData, 4000);
                            sendTele("🚀 V12.3 ONLINE! Đã thông bộ não AI.");
                        }
                        if (m === "/ping") {
                            sendTele(`✅ Bot ổn định.\n📊 RSI: ${currentRSI}\n🌊 Biến động: ${currentRange}`);
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(m) { fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(m)}`); }
    </script>
</body>
</html>
