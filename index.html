<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD MASTER V28.2 - SCALP PRO</title>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --green: #00f0b5; --red: #ff3b30; --gold: #ffd700; --blue: #00d4ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .card { border: 1px solid #333; border-top: 5px solid var(--gold); border-radius: 15px; padding: 20px; background: var(--card); max-width: 420px; margin: 10px auto; }
        .price { font-size: 50px; font-weight: bold; margin: 10px 0; color: white; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .info-box { background: #2b3139; padding: 10px; border-radius: 8px; border: 1px solid #383f47; }
        .info-box span { display: block; font-size: 9px; color: #848e9c; text-transform: uppercase; }
        .info-box b { font-size: 16px; color: var(--gold); }
        .status-bar { padding: 10px; border-radius: 8px; background: rgba(0, 212, 255, 0.1); border: 1px solid var(--blue); margin-top: 10px; font-weight: bold; font-size: 13px; }
        .wallet-info { font-size: 11px; color: var(--green); margin-bottom: 10px; }
    </style>
</head>
<body onload="initBot()">
    <div class="card">
        <div class="wallet-info">💰 VỐN MỤC TIÊU: 113.00 USD | MODE: SCALPING</div>
        <div id="modeTag" style="font-size: 12px; color: var(--blue); font-weight: bold;">HỆ THỐNG MASTER V28.2</div>
        <div id="goldPrice" class="price">0.00</div>
        
        <div class="info-grid">
            <div class="info-box"><span>VOL</span><b id="volPower">--</b></div>
            <div class="info-box"><span>ATR</span><b id="atrVal">--</b></div>
            <div class="info-box"><span>SÓNG</span><b id="wavePower">--</b></div>
        </div>

        <div class="status-bar" id="marketState">Đang quét cấu trúc...</div>
        <div id="multiTrend" style="margin-top:15px; font-size: 12px; color: #848e9c;">SCALP MODE: ACTIVE</div>
    </div>

    <script>
        const TOKEN = "8586899878:AAHONzWJqzUMswUPMjn5xaWvYrwDHSH4OYE";
        const CHAT_ID = "7994694689";

        let lastUpdateId = 0, priceOffset = 0, basePrice = 0, isTrading = false;
        let globalData = [];

        async function initBot() {
            await updateData();
            sendTele("🚀 **BOT V28.2 ĐÃ LÊN ĐÈN!**\nVốn: 113 USD - Sẵn sàng Scalp.");
            setInterval(updateData, 2000);
            setInterval(checkTeleCommands, 1500);
        }

        async function updateData() {
            try {
                const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=15m&limit=100`);
                globalData = await r.json();
                const prices = globalData.map(x => parseFloat(x[4]));
                const volumes = globalData.map(x => parseFloat(x[5]));
                
                basePrice = prices[prices.length - 1];
                const currentPrice = basePrice + priceOffset;
                document.getElementById('goldPrice').innerText = currentPrice.toFixed(2);

                const avgVol = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
                const volRatio = (volumes[volumes.length - 1] / avgVol).toFixed(1);
                const atr = calculateATR(globalData);
                
                document.getElementById('volPower').innerText = volRatio + "x";
                document.getElementById('atrVal').innerText = atr.toFixed(2);
                document.getElementById('wavePower').innerText = (currentPrice - prices[prices.length-5]).toFixed(2);

                const structure = analyzeStructure(globalData);
                if (!isTrading) {
                    checkSignal(currentPrice, volRatio, atr, structure);
                } else {
                    document.getElementById('marketState').innerText = "🏹 ĐANG TRONG LỆNH...";
                }
            } catch (e) {}
        }

        function calculateATR(data) {
            let sum = 0;
            for (let i = data.length - 14; i < data.length; i++) {
                sum += (parseFloat(data[i][2]) - parseFloat(data[i][3]));
            }
            return sum / 14;
        }

        function analyzeStructure(data) {
            const last20 = data.slice(-20);
            const high = Math.max(...last20.map(x => x[2]));
            const low = Math.min(...last20.map(x => x[3]));
            const current = parseFloat(data[data.length-1][4]);
            if (current > (high - (high-low)*0.2)) return "TĂNG";
            if (current < (low + (high-low)*0.2)) return "GIẢM";
            return "SIDEWAY";
        }

        function checkSignal(price, vol, atr, structure) {
            const pattern = detectPattern(globalData);
            if (vol > 1.8) {
                execute(structure === "TĂNG" ? "BUY" : "SELL", "TREND JACKPOT 🔥", atr, pattern);
            } else if (structure === "SIDEWAY" && pattern.includes("RÚT RÂU")) {
                if (pattern.includes("DƯỚI")) execute("BUY", "VÉT RÂU SIDEWAY 💤", atr, pattern);
                if (pattern.includes("TRÊN")) execute("SELL", "VÉT RÂU SIDEWAY 💤", atr, pattern);
            }
        }

        function detectPattern(data) {
            const c = data[data.length-1];
            const o = parseFloat(c[1]), h = parseFloat(c[2]), l = parseFloat(c[3]), cl = parseFloat(c[4]);
            const body = Math.abs(cl - o), lower = Math.min(o, cl) - l, upper = h - Math.max(o, cl);
            if (lower > body * 1.5) return "RÚT RÂU DƯỚI 🚀";
            if (upper > body * 1.5) return "RÚT RÂU TRÊN ❄️";
            return "NẾN CHUẨN";
        }

        function execute(type, mode, atr, pattern) {
            isTrading = true;
            const p = basePrice + priceOffset;
            const entry2 = (type === "BUY") ? p - (atr*0.3) : p + (atr*0.3);
            const sl = (type === "BUY") ? p - (atr*2) : p + (atr*2);
            const tp = (type === "BUY") ? p + (atr*6) : p - (atr*6);

            let msg = `⚔️ **KÈO SCALP MASTER**\n\n📌 Mode: **${mode}**\n🎯 Lệnh: **${type}**\n\n📍 Entry 1: **${p.toFixed(2)}**\n📍 Entry 2: **${entry2.toFixed(2)}**\n🛑 SL: **${sl.toFixed(2)}** (~5u)\n💰 TP: **${tp.toFixed(2)}** (+20u++)\n\n⚠️ *Đi Vol 0.01 cho vốn 113u!*`;
            
            const keyboard = { inline_keyboard: [[{ text: "✅ XONG KÈO", callback_data: "done" }]] };
            sendTeleWithKB(msg, keyboard);
        }

        async function checkTeleCommands() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const d = await r.json();
                if (d.result) {
                    for (let u of d.result) {
                        lastUpdateId = u.update_id;
                        let cmd = u.message ? u.message.text.toLowerCase() : (u.callback_query ? u.callback_query.data : "");

                        if (cmd === "done" || cmd === "/done") {
                            isTrading = false;
                            sendTele("✅ Đã Reset. Chờ kèo Scalp mới!");
                        }
                        if (cmd === "/sltp") {
                            const p = basePrice + priceOffset;
                            const atr = calculateATR(globalData);
                            execute("BUY/SELL (Tùy cấu trúc)", "SOÁT LỆNH NHANH", atr, "N/A");
                        }
                        if (cmd.startsWith("/sync")) {
                            const p = parseFloat(cmd.replace("/sync",""));
                            if (!isNaN(p)) {
                                priceOffset = p - basePrice;
                                sendTele(`🎯 Đã khớp giá sàn: ${p.toFixed(2)}`);
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        function sendTele(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        function sendTeleWithKB(msg, kb) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown&reply_markup=${JSON.stringify(kb)}`);
        }
    </script>
</body>
</html>
